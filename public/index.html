<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Termux App Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Curated for terminal-first users</p>
        <h1>Termux App Store</h1>
        <p class="hero-copy">
          Discover useful packages, inspect install commands, and build a cleaner
          onboarding experience for Termux power users.
        </p>
      </section>

      <section class="controls">
        <input
          id="searchInput"
          type="search"
          placeholder="Search packages, tags, or use cases"
          aria-label="Search packages"
        />
        <select id="categorySelect" aria-label="Filter by category">
          <option value="">All categories</option>
        </select>
      </section>

      <section class="results-header">
        <h2>Catalog</h2>
        <p id="resultCount">Loading packages...</p>
      </section>

      <section id="packageGrid" class="package-grid"></section>
    </main>

    <template id="packageCardTemplate">
      <article class="card">
        <div class="card-top">
          <span class="category"></span>
          <h3 class="name"></h3>
        </div>
        <p class="description"></p>
        <div class="tags"></div>
        <div class="install-box">
          <code class="install-command"></code>
          <button class="copy-button" type="button">Copy</button>
        </div>
        <a class="homepage" target="_blank" rel="noreferrer">Project site</a>
      </article>
    </template>

    <script src="/app.js"></script>
  </body>
</html>
